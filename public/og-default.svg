<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="AnimeDB  IMDB for Anime">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0814" />
      <stop offset="50%" stop-color="#1a0826" />
      <stop offset="100%" stop-color="#080d1f" />
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e879f9" />
      <stop offset="35%" stop-color="#a78bfa" />
      <stop offset="65%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a3e635" />
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.35" />
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0a0814" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#0a0814" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <g transform="translate(80, 110)" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
    <text x="0" y="0" fill="#e879f9" font-size="24" font-weight="800" letter-spacing="6">ANIMEDB</text>
    <text x="0" y="190" fill="url(#rainbow)" font-size="156" font-weight="900" letter-spacing="-4">IMDB for</text>
    <text x="0" y="340" fill="#ffffff" font-size="156" font-weight="900" letter-spacing="-4">Anime.</text>
    <text x="0" y="430" fill="#a1a1aa" font-size="36" font-weight="600">Top-rated series · Episodes · Voice actors</text>
    <text x="0" y="478" fill="#a1a1aa" font-size="36" font-weight="600">Characters · Scenes</text>
  </g>

  <rect x="0" y="0" width="1200" height="6" fill="url(#rainbow)" />
</svg>
