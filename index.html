<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0814" />
    <meta name="color-scheme" content="dark" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Resource hints: warm up TCP/TLS for the API and image CDNs before they're needed. -->
    <link rel="preconnect" href="https://api.jikan.moe" crossorigin />
    <link rel="dns-prefetch" href="https://api.jikan.moe" />
    <link rel="preconnect" href="https://cdn.myanimelist.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.myanimelist.net" />
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />

    <!-- Preload the local placeholder so missing-thumbnail cards never wait
         on a second network round-trip. -->
    <link rel="preload" as="image" href="/placeholder.svg" />

    <title>AnimeDB — IMDB for Anime</title>
    <meta
      name="description"
      content="An IMDB-style catalog for anime: top-rated series, episode breakdowns, voice actors, characters, and a curated catalog of the medium's most iconic scenes."
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AnimeDB" />
    <meta property="og:title" content="AnimeDB — IMDB for Anime" />
    <meta
      property="og:description"
      content="Top-rated series, episode breakdowns, voice actors, characters, and a curated catalog of iconic anime scenes."
    />
    <meta property="og:image" content="/og-default.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AnimeDB — IMDB for Anime" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AnimeDB — IMDB for Anime" />
    <meta
      name="twitter:description"
      content="Top-rated series, episode breakdowns, voice actors, characters, and a curated catalog of iconic anime scenes."
    />
    <meta name="twitter:image" content="/og-default.svg" />
    <meta name="twitter:image:alt" content="AnimeDB — IMDB for Anime" />
  </head>
  <body class="bg-zinc-950 text-zinc-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
